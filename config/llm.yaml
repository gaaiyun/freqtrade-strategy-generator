llm:
  provider: openai  # openai, anthropic, dashscope
  model: gpt-4
  temperature: 0.7
  max_tokens: 2000

generation:
  include_comments: true
  include_docstrings: true
  validate_syntax: true
  auto_format: true

freqtrade:
  user_data_dir: ~/.freqtrade/user_data
  strategies_dir: strategies
  config_file: config.json
